# @package _global_
defaults:
  - override /hydra/launcher: basic

ntupelizer_args: "--pythia"
input_dir: ""
output_dir: ""
batch_size: 100000
enable_validation: False

# File discovery
max_files_per_dataset: 20
subdirectories: []

# SLURM configuration
slurm_config:
  job_name: "ntupelizer"
  time: "02:00:00"
  memory: "4G"
  partition: "short"
  ntasks: 1
  cpus_per_task: 1

# Merging configuration
merge_config:
  chunk_size: 1000
  max_memory: "2G"

# Weight calculation configuration  
weight_config:
  kinematic_reweighting: true
  kinematic_weights:
    pt_bins: [20, 40, 60, 100, 200, 500, 1000]
    eta_bins: [-2.5, -2.0, -1.5, -1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0, 2.5]
    mass_bins: [0, 0.3, 0.6, 1.0, 1.5, 2.0, 3.0, 5.0, 10.0]
  class_reweighting: true
  inverse_frequency_weighting: false
  effective_sample_size: true

# Validation configuration
validation_config:
  compare_old_ntupelizer: true
  create_plots: true
  output_format: ["png", "pdf"]
  plots:
    - "jet_kinematics"
    - "tau_kinematics"  
    - "constituent_distributions"
    - "classifier_inputs"